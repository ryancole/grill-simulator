# Control bindings. Each action names the key (or keys) that drive it. Like the
# levels, this file is parsed at startup, so a rebind is a text edit and a relaunch
# -- no recompile.
#
# Key names are case-insensitive and may be:
#   * a single letter A-Z or digit 0-9   ("W", "e", "1")
#   * a named key: Space, Shift, Ctrl, Alt, Enter, Tab, Esc, Backspace,
#     Up, Down, Left, Right, Backtick (the ` key, also Grave/Tilde), or F1-F12
#   * a mouse button: Mouse1 (left, also LMB), Mouse2 (right, RMB), Mouse3 (middle, MMB)
#
# An action may bind several keys at once -- write a list and any of them triggers
# it: `move_forward = ["W", "Up"]`. An empty list unbinds the action entirely.
#
# Any action left out below keeps its built-in default (shown here), so deleting a
# line is the same as leaving it at stock.
#
# The gameplay actions can also be rebound in-game from Options > Keybinds. Those
# edits are written to a separate controls.user.toml next to the game, layered over
# this file at startup -- so this file stays the shipped defaults and an in-game
# rebind survives a relaunch without editing anything here.

[bindings]
# Movement and gameplay.
move_forward = "W"
move_back    = "S"
move_left    = "A"
move_right   = "D"
jump         = "Space"
sprint       = "Shift"
crouch       = "Ctrl"
interact     = "E"
# The main action, on left mouse. Triggers the ability of the held item (see the
# per-carryable `ability` in catalog.toml); does nothing empty-handed.
primary_action = "Mouse1"

# Developer shortcuts.
reload_level   = "R"
select_level_1 = "1"
select_level_2 = "2"
toggle_debug   = "Backtick"

# Menu navigation (the launch screen, and later the pause menu). Bound to both the
# arrow keys and the movement keys so either hand can drive the list.
menu_up      = ["Up", "W"]
menu_down    = ["Down", "S"]
menu_confirm = ["Enter", "Space"]
