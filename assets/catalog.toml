# The catalog: the game's object archetypes -- what a "steak" or a "charcoal_grill" is,
# independent of any level. Levels place these by name (a prop's or carryable's `type`);
# this file says how each behaves. A TOML file, parsed at runtime (see src/catalog.cpp),
# so a new type is a text edit and a re-stage, not a rebuild -- reload a level in-game
# (R) to pick it up.
#
# Three kinds of type, each in its own table namespace:
#
#   [food.<name>]  -- a carryable that grills. Fields (all but the model optional):
#       model              -- the .glb under assets/models that draws it. A food with
#                             one look gives this; browning is done by tint alone.
#       models             -- instead of `model`, a list of {model, from} for a food
#                             that swaps mesh as it cooks: `from` is the doneness band
#                             the model kicks in at (raw, rare, medium_rare, medium,
#                             medium_well, well_done, burnt; defaults raw). The tint
#                             still browns whichever model shows. Give one or the other.
#       cook_tau           -- thermal time constant, seconds: how slowly the core chases
#                             the surrounding heat. Bigger = a thicker cut, slower.
#       cook_threshold_f   -- degrees F the core must pass before doneness banks at all.
#       doneness_gain      -- how fast doneness banks per degree over the threshold, per
#                             second. Bigger = cooks (and burns) faster.
#       bands              -- the six doneness thresholds [rare, medium_rare, medium,
#                             medium_well, well_done, burnt] the readout is cut from.
#       raw_tint / seared_tint / char_tint -- [r,g,b] the surface browns through.
#       knock              -- 1..10, how hard it is to shove around.
#       sound              -- clip on a hard landing ("meat", "metal", ...).
#       hold               -- how it sits in hand ("flat" default, or "tongs").
#       ability            -- what the primary action (left mouse) does with it in hand.
#                             "none" (default, no behaviour) or "grip_meat" (the tongs:
#                             clamp a meat to carry it, press again to release).
#
#   [tool.<name>]  -- a carryable that does not cook (the tongs, the serving tray). Same
#       fields as a food minus the cook profile, plus:
#       hold               -- how it sits in hand: "flat" (default), "tongs", or "tray".
#       serve              -- delivery radius in metres (ground plane): makes the tool a
#                             serving tray. A carried meat brought within it can be served,
#                             filling a level's matching order, and sticks to the tray;
#                             the tray itself is picked up and carried like any carryable.
#                             With optional `serve_offset` ([x,y,z] to its top surface in
#                             model space). Omit and the tool takes no food.
#
#   [prop.<name>]  -- placed furniture or scenery. Fields:
#       model              -- the .glb (required).
#       dynamic            -- true makes it a knock-over-able body reading mass/knock/
#                             sound (and heat); omit for immovable world.
#       mass / knock       -- kg, and the 1..10 how-hard-to-topple rating (dynamic only).
#       sound              -- clip on a hard landing.
#       heat               -- grate temperature in F: makes a dynamic prop radiate heat
#                             that cooks the food set on it. With optional `heat_reach`
#                             (metres it carries) and `heat_offset` ([x,y,z] up to the
#                             grate). Omit and the prop is cold.
#
# The two starting meats carry the original cook constants explicitly, so today they
# still cook identically -- but each can now be tuned on its own (a chicken to a higher
# safe temp, a sausage to cook faster) without touching any code.

# --- Carryables: foods -------------------------------------------------------------

[food.steak]
model = "steak-cooked.glb"
cook_tau = 90.0
cook_threshold_f = 130.0
doneness_gain = 0.0002
bands = [0.12, 0.28, 0.45, 0.62, 0.80, 1.15]
raw_tint = [1.0, 1.0, 1.0]
seared_tint = [0.50, 0.34, 0.24]
char_tint = [0.13, 0.11, 0.10]
knock = 4.0
sound = "meat"

[food.chicken]
# Chicken changes model as it cooks, not just tint: it draws raw until it reaches
# medium, then swaps to the cooked look (which the browning tint keeps darkening on
# toward burnt). A `models` list replaces the single `model`; the first is the base.
models = [
  {model = "chicken-raw.glb"},
  {model = "chicken-cooked.glb", from = "medium"},
]
cook_tau = 90.0
cook_threshold_f = 130.0
doneness_gain = 0.0002
bands = [0.12, 0.28, 0.45, 0.62, 0.80, 1.15]
raw_tint = [1.0, 1.0, 1.0]
seared_tint = [0.50, 0.34, 0.24]
char_tint = [0.13, 0.11, 0.10]
knock = 4.0
sound = "meat"

[food.patty]
model = "burger-raw.glb"
cook_tau = 90.0
cook_threshold_f = 130.0
doneness_gain = 0.0002
bands = [0.12, 0.28, 0.45, 0.62, 0.80, 1.15]
raw_tint = [1.0, 1.0, 1.0]
seared_tint = [0.50, 0.34, 0.24]
char_tint = [0.13, 0.11, 0.10]
knock = 4.0
sound = "meat"

# --- Carryables: tools -------------------------------------------------------------

[tool.tongs]
model = "tongs-metal.glb"
knock = 2.0
sound = "metal"
hold = "tongs"
# The primary action (left mouse) clamps a meat in the jaws to carry it, and releases
# it on a second press -- only a meat is grippable, never another tool or the tray.
ability = "grip_meat"

# The serving tray: a carryable delivery surface. `serve` is the ground-plane radius a
# meat must be brought within; `serve_offset` is its top face in model space, where
# delivered meat sticks. It is picked up and carried like anything else -- served meat
# rides it, raw meat merely resting on it falls off when it moves.
[tool.tray]
model = "tray.glb"
serve = 0.8
serve_offset = [0.0, 0.023, 0.050]
hold = "tray"
knock = 3.0
sound = "metal"

# The grill lid: a carryable, not furniture. It starts resting on the grill base and can
# be lifted off (E) to expose the grate, carried around, and set back down -- like the
# tongs or tray, it is a dynamic body, so a dropped lid falls and tumbles. Held "tray"
# style so it rides dome-up out front. It takes no food, so no `serve`. Its type is a
# plain "lid" so the pick-up prompt reads "[E] Pick up lid", not an underscored key.
[tool.lid]
model = "charcoal-grill-lid.glb"
hold = "tray"
knock = 4.0
sound = "grill_lid"

# --- Props: furniture and scenery --------------------------------------------------

# The charcoal grill base: a dynamic body that radiates heat from its grate. Its lid is
# not furniture -- it is a carryable ([tool.lid] above) that rests on this base and
# can be lifted off. `heat_offset` lifts the hot centre up off the feet. These three are
# the cook's placement-independent tuning knobs (the per-food ones are on the foods above).
[prop.charcoal_grill]
model = "charcoal-grill-base.glb"
dynamic = true
mass = 10.0
knock = 8.0
sound = "grill_base"
heat = 425.0
heat_reach = 1.0
heat_offset = [0.0, 0.62, 0.0]

[prop.cooler]
model = "cooler-basic.glb"
dynamic = true
mass = 14.0
knock = 7.0

[prop.bench]
model = "bench-basic.glb"

[prop.crate]
model = "crate.glb"

[prop.tree]
model = "tree.glb"

# The campfire pit: scenery for now -- a plain static prop, no `dynamic` and no `heat`.
# (It is not the cook's heat source; that will come from elsewhere.)
[prop.firepit]
model = "firepit.glb"
